<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Ruabbit Cydia Repo</title>
		<link rel="icon" href="CydiaIcon.png">
		<link href="css/materialize.min.css" rel="stylesheet">
		<style>
			body {
				background: #f7f8fa;
				color: #17202a;
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
				margin: 0;
			}

			main {
				margin: 0 auto;
				max-width: 760px;
				padding: 56px 20px;
			}

			.repo-header {
				align-items: center;
				display: flex;
				gap: 18px;
				margin-bottom: 28px;
			}

			.repo-icon {
				height: 72px;
				width: 72px;
			}

			h1 {
				font-size: 34px;
				font-weight: 600;
				letter-spacing: 0;
				line-height: 1.18;
				margin: 0 0 6px;
			}

			.repo-url {
				background: #ffffff;
				border: 1px solid #dce2ea;
				border-radius: 8px;
				font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
				overflow-wrap: anywhere;
				padding: 14px 16px;
			}

			.actions {
				display: flex;
				flex-wrap: wrap;
				gap: 12px;
				margin: 24px 0 36px;
			}

			.actions .btn {
				border-radius: 6px;
				box-shadow: none;
				text-transform: none;
			}

			.metadata {
				border-top: 1px solid #dce2ea;
				display: grid;
				gap: 12px;
				grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
				padding-top: 24px;
			}

			.metadata a {
				color: #1769aa;
			}
		</style>
	</head>
	<body>
		<main>
			<section class="repo-header">
				<img class="repo-icon" src="CydiaIcon.png" alt="">
				<div>
					<h1>Ruabbit Cydia Repo</h1>
					<div>Static iOS jailbreak package repository</div>
				</div>
			</section>

			<div class="repo-url">https://ruabbit.github.io</div>

			<div class="actions">
				<a class="btn waves-effect waves-light" href="cydia://url/https://cydia.saurik.com/api/share#?source=https://ruabbit.github.io">Add to Cydia</a>
				<a class="btn-flat waves-effect" href="Packages">Packages</a>
				<a class="btn-flat waves-effect" href="Release">Release</a>
			</div>

			<section class="metadata">
				<div>
					<strong>Packages</strong>
					<div><a href="Packages">Current index</a></div>
				</div>
				<div>
					<strong>Architecture</strong>
					<div>iphoneos-arm</div>
				</div>
				<div>
					<strong>Indexes</strong>
					<div><a href="Packages.gz">Packages.gz</a> / <a href="Packages.bz2">Packages.bz2</a></div>
				</div>
			</section>
		</main>
	</body>
</html>
